name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: '.'
          severity: warning

  bash-syntax:
    name: bash syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify scripts parse
        run: |
          bash -n get-diff-refs.sh
          bash -n post-inline-comment.sh
      - name: Verify --help works
        run: |
          chmod +x *.sh
          ./get-diff-refs.sh --help
          ./post-inline-comment.sh --help
